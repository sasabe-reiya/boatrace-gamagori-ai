[server]
headless = true
enableCORS = false
enableXsrfProtection = false

[theme]
primaryColor = "#FFD700"
backgroundColor = "#0a0a23"
secondaryBackgroundColor = "#1a1a3e"
textColor = "#e8f4ff"
font = "sans serif"

[client]
toolbarMode = "viewer"
showErrorDetails = true

[browser]
gatherUsageStats = false
